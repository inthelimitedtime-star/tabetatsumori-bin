<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>食べたつもり便</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>食べたつもり便</h1>
      <p>食べたいものを好きなだけ</p>
    </header>

    <section class="saving-box">
      <div>
        <span class="label">今日の節約</span>
        <strong id="todaySaved">¥0</strong>
      </div>
      <div>
        <span class="label">累計</span>
        <strong id="totalSaved">¥0</strong>
      </div>
    </section>

    <section id="categorySection" class="screen active">
      <h2>カテゴリを選ぶ</h2>
      <div id="categoryList" class="card-grid"></div>
    </section>

    <section id="storeSection" class="screen">
      <button id="backToCategories" class="back-btn">← カテゴリに戻る</button>
      <h2 id="storeTitle">店舗を選ぶ</h2>
      <div id="storeList" class="card-grid"></div>
    </section>

    <section id="itemSection" class="screen">
      <button id="backToStores" class="back-btn">← 店舗に戻る</button>
      <h2 id="itemTitle">商品を選ぶ</h2>
      <div id="itemList" class="item-list"></div>
    </section>

    <section id="resultSection" class="screen">
      <div class="result-card">
        <p id="deliveryStatus" class="delivery-status">注文を受け付けたつもりです</p>
        <h2 id="resultTitle"></h2>
        <p id="resultText"></p>
        <button id="orderAgain" class="main-btn">もう一品選ぶ</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
